<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Bookings — Town Parcel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div style="width:38px;height:38px;border-radius:8px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--black);">TP</div>
      <div class="name">Town Parcel <span>Admin</span></div>
    </div>
    <nav class="nav-group">
      <a class="nav-link" href="dashboard.html"><span class="ico">&#9635;</span> Dashboard</a>
      <a class="nav-link active" href="bookings.html"><span class="ico">&#128230;</span> Bookings</a>
      <a class="nav-link" href="partners.html"><span class="ico">&#127970;</span> Partners</a>
      <a class="nav-link" href="riders.html"><span class="ico">&#128690;</span> Riders</a>
      <a class="nav-link" href="messages.html"><span class="ico">&#9993;</span> Messages</a>
    </nav>
    <div class="sidebar-foot">
      <div class="email" data-admin-email>Loading…</div>
      <button class="btn-logout" onclick="adminLogout()">Log Out</button>
    </div>
  </aside>

  <div class="main">
    <div class="mobile-topbar">
      <button id="mobileMenuBtn">&#9776;</button>
      <strong>Town Parcel Admin</strong>
    </div>
    <div class="topbar">
      <div>
        <h1 id="pageTitle">Bookings</h1>
        <div class="sub" id="pageSub"></div>
      </div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="input input-search" id="searchInput" placeholder="Search booking ID, shop, customer, phone, address...">
          <select class="input" id="statusFilter"></select>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-outline btn-sm" id="refreshBtn">&#8635; Refresh</button>
          <button class="btn btn-gold btn-sm" id="exportBtn">&#8595; Export CSV</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="pagination" id="paginationBar"></div>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="viewModalOverlay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeViewModal()">&times;</button>
    <h3>Booking Details</h3>
    <div class="modal-grid" id="viewModalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeViewModal()">Close</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModalOverlay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeEditModal()">&times;</button>
    <h3>Edit Booking</h3>
    <input type="hidden" id="editModalId">
    <div class="modal-grid" id="editModalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-gold" id="editSaveBtn" onclick="saveEditModal()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toastHost"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/ui-utils.js"></script>
<script src="js/table-page.js"></script>
<script>
(async () => {
  const session = await requireAdminAuth();
  if(!session) return;

  initTablePage({
    tableName: 'customer_bookings',
    title: 'Bookings',
    subtitle: 'All customer delivery bookings',
    idField: 'id',
    statusField: 'booking_status',
    statusOptions: ['pending','accepted','assigned','picked_up','out_for_delivery','delivered','cancelled','failed'],
    searchFields: ['booking_id','shop_name','customer_name','customer_phone','delivery_address'],
    columns: [
      { key:'created_at', label:'Date', type:'date' },
      { key:'booking_id', label:'Booking ID' },
      { key:'shop_name', label:'Shop' },
      { key:'customer_name', label:'Customer' },
      { key:'customer_phone', label:'Phone' },
      { key:'delivery_address', label:'Delivery Address' },
      { key:'pickup_item', label:'Item' },
      { key:'item_quantity', label:'Qty' },
      { key:'item_value', label:'Value', type:'money' },
      { key:'payment_status', label:'Payment' },
      { key:'booking_status', label:'Status', type:'status' }
    ],
    editableFields: [
      { key:'shop_name', label:'Shop Name' },
      { key:'shop_address', label:'Shop Address' },
      { key:'shop_phone', label:'Shop Phone' },
      { key:'customer_name', label:'Customer Name' },
      { key:'customer_phone', label:'Customer Phone' },
      { key:'delivery_address', label:'Delivery Address' },
      { key:'pickup_item', label:'Pickup Item' },
      { key:'item_quantity', label:'Quantity' },
      { key:'item_value', label:'Item Value', type:'number' },
      { key:'payment_status', label:'Payment Status', type:'select', options:['pending','paid','cod'] },
      { key:'payment_method', label:'Payment Method', type:'select', options:['cash','upi','card'] },
      { key:'rider_name', label:'Assigned Rider Name' },
      { key:'rider_phone', label:'Assigned Rider Phone' },
      { key:'booking_status', label:'Booking Status', type:'select', options:['pending','accepted','assigned','picked_up','out_for_delivery','delivered','cancelled','failed'] },
      { key:'notes', label:'Notes', type:'textarea' }
    ],
    quickLinks: (row) => ([
      { icon:'&#128222;', label:'Call customer', href:'tel:' + (row.customer_phone||'') },
      { icon:'&#128172;', label:'WhatsApp customer', href:'https://wa.me/91' + (row.customer_phone||'').replace(/\D/g,'') }
    ]),
    csvFilename: 'town_parcel_bookings.csv'
  });
})();
</script>
</body>
</html>
