<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Personal Deliveries — Town Parcel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="admin-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div style="width:38px;height:38px;border-radius:8px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--black);">TP</div>
      <div class="name">Town Parcel <span>Admin</span></div>
    </div>
    <nav class="nav-group">
      <a class="nav-link" href="dashboard.html"><span class="ico">&#9635;</span> Dashboard</a>
      <a class="nav-link" href="bookings.html"><span class="ico">&#128230;</span> Bookings</a>
      <a class="nav-link active" href="personal-deliveries.html"><span class="ico">&#128100;</span> Personal Deliveries</a>
      <a class="nav-link" href="partners.html"><span class="ico">&#127970;</span> Partners</a>
      <a class="nav-link" href="riders.html"><span class="ico">&#128690;</span> Riders</a>
      <a class="nav-link" href="messages.html"><span class="ico">&#9993;</span> Messages</a>
      <a class="nav-link" href="customers.html"><span class="ico">&#128100;</span> Customers</a>
      <a class="nav-link" href="reports.html"><span class="ico">&#128202;</span> Reports</a>
      <a class="nav-link" href="settings.html"><span class="ico">&#9881;</span> Settings</a>
    </nav>
    <div class="sidebar-foot">
      <div class="email" data-admin-email>Loading…</div>
      <button class="btn-logout" onclick="adminLogout()">Log Out</button>
    </div>
  </aside>

  <div class="main">
    <div class="mobile-topbar">
      <button id="mobileMenuBtn">&#9776;</button>
      <strong>Town Parcel Admin</strong>
    </div>
    <div class="topbar">
      <div>
        <h1 id="pageTitle">Personal Deliveries</h1>
        <div class="sub" id="pageSub"></div>
      </div>
    </div>

    <div class="content">
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="input input-search" id="searchInput" placeholder="Search booking ID, name, mobile, receiver...">
          <select class="input" id="statusFilter"></select>
        </div>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-outline btn-sm" id="refreshBtn">&#8635; Refresh</button>
          <button class="btn btn-gold btn-sm" id="exportBtn">&#8595; Export CSV</button>
          <button class="btn btn-dark btn-sm" id="exportExcelBtn">&#8595; Export Excel</button>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="pagination" id="paginationBar"></div>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="viewModalOverlay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeViewModal()">&times;</button>
    <h3>Personal Delivery Details</h3>
    <div class="modal-grid" id="viewModalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeViewModal()">Close</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModalOverlay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeEditModal()">&times;</button>
    <h3>Edit Personal Delivery</h3>
    <input type="hidden" id="editModalId">
    <div class="modal-grid" id="editModalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-gold" id="editSaveBtn" onclick="saveEditModal()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toastHost"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/ui-utils.js"></script>
<script src="js/table-page.js"></script>
<script>
(async () => {
  const session = await requireAdminAuth();
  if(!session) return;

  initTablePage({
    tableName: 'personal_delivery_bookings',
    title: 'Personal Deliveries',
    subtitle: 'All personal delivery bookings — documents, gifts, parcels, medicines & small packages',
    idField: 'id',
    statusField: 'status',
    statusOptions: ['pending','accepted','assigned','picked_up','out_for_delivery','delivered','cancelled','failed'],
    searchFields: ['booking_id','customer_name','mobile','receiver_name','receiver_mobile'],
    columns: [
      { key:'created_at', label:'Date', type:'date' },
      { key:'booking_id', label:'Booking ID' },
      { key:'customer_name', label:'Customer' },
      { key:'mobile', label:'Mobile' },
      { key:'receiver_name', label:'Receiver' },
      { key:'package_type', label:'Package Type' },
      { key:'payment_method', label:'Payment' },
      { key:'status', label:'Status', type:'status' }
    ],
    editableFields: [
      { key:'customer_name', label:'Customer Name' },
      { key:'mobile', label:'Mobile' },
      { key:'alternate_mobile', label:'Alternate Mobile' },
      { key:'pickup_address', label:'Pickup Address' },
      { key:'delivery_address', label:'Delivery Address' },
      { key:'receiver_name', label:'Receiver Name' },
      { key:'receiver_mobile', label:'Receiver Mobile' },
      { key:'package_type', label:'Package Type', type:'select', options:['Documents','Gift','Personal Parcel','Medicines','Small Package','Other'] },
      { key:'package_description', label:'Package Description' },
      { key:'weight', label:'Approximate Weight' },
      { key:'pickup_time', label:'Preferred Pickup Time' },
      { key:'payment_method', label:'Payment Method', type:'select', options:['Prepaid','Cash'] },
      { key:'instructions', label:'Special Instructions', type:'textarea' },
      { key:'rider_name', label:'Assigned Rider Name' },
      { key:'rider_phone', label:'Assigned Rider Phone' },
      { key:'status', label:'Status', type:'select', options:['pending','accepted','assigned','picked_up','out_for_delivery','delivered','cancelled','failed'] }
    ],
    quickLinks: (row) => ([
      { icon:'&#128222;', label:'Call customer', href:'tel:' + (row.mobile||'') },
      { icon:'&#128172;', label:'WhatsApp customer', href:'https://wa.me/91' + (row.mobile||'').replace(/\D/g,'') }
    ]),
    extraRowActions: (row) => (
      `<button class="btn btn-sm btn-outline" onclick="printPersonalDelivery('${row.id}')">&#128438; Print</button>`
    ),
    csvFilename: 'town_parcel_personal_deliveries.csv'
  });
})();

function printPersonalDelivery(id){
  const row = TP_STATE.allRows.find(r => String(r.id) === String(id));
  if(!row) return;

  const win = window.open('', '_blank', 'width=800,height=900');

  win.document.write(`
    <html>
    <head>
      <title>Personal Delivery ${escapeHtml(row.booking_id || row.id)} — Town Parcel</title>
      <style>
        body{font-family:Arial, sans-serif; padding:36px; color:#111;}
        .head{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:3px solid #D4A017; padding-bottom:16px; margin-bottom:24px;}
        .head h1{margin:0; font-size:1.5rem;}
        .head .gold{color:#D4A017;}
        .head .meta{text-align:right; font-size:.85rem; color:#555;}
        table{width:100%; border-collapse:collapse; margin-top:10px;}
        td{padding:8px 6px; border-bottom:1px solid #eee; font-size:.92rem; vertical-align:top;}
        td.label{font-weight:700; width:200px; color:#555;}
        .section-title{font-weight:800; margin-top:24px; margin-bottom:6px; font-size:1rem; border-bottom:1px solid #ddd; padding-bottom:4px;}
        .footer{margin-top:36px; text-align:center; color:#888; font-size:.8rem;}
        @media print{ .no-print{display:none;} }
      </style>
    </head>
    <body>
      <div class="head">
        <div>
          <h1>Town<span class="gold">Parcel</span></h1>
          <div style="font-size:.85rem;color:#555;">Personal Delivery Slip</div>
        </div>
        <div class="meta">
          <div><strong>Booking ID:</strong> ${escapeHtml(row.booking_id || '—')}</div>
          <div>${formatDateTime(row.created_at)}</div>
          <div>Status: ${escapeHtml(row.status || 'pending')}</div>
        </div>
      </div>

      <div class="section-title">Sender / Pickup Details</div>
      <table>
        <tr><td class="label">Customer Name</td><td>${escapeHtml(row.customer_name)}</td></tr>
        <tr><td class="label">Mobile</td><td>${escapeHtml(row.mobile)}</td></tr>
        <tr><td class="label">Alternate Mobile</td><td>${escapeHtml(row.alternate_mobile || '—')}</td></tr>
        <tr><td class="label">Pickup Address</td><td>${escapeHtml(row.pickup_address)}</td></tr>
      </table>

      <div class="section-title">Receiver / Delivery Details</div>
      <table>
        <tr><td class="label">Receiver Name</td><td>${escapeHtml(row.receiver_name)}</td></tr>
        <tr><td class="label">Receiver Mobile</td><td>${escapeHtml(row.receiver_mobile)}</td></tr>
        <tr><td class="label">Delivery Address</td><td>${escapeHtml(row.delivery_address)}</td></tr>
      </table>

      <div class="section-title">Package &amp; Payment</div>
      <table>
        <tr><td class="label">Package Type</td><td>${escapeHtml(row.package_type)}</td></tr>
        <tr><td class="label">Description</td><td>${escapeHtml(row.package_description)}</td></tr>
        <tr><td class="label">Approx. Weight</td><td>${escapeHtml(row.weight)}</td></tr>
        <tr><td class="label">Preferred Pickup Time</td><td>${escapeHtml(row.pickup_time)}</td></tr>
        <tr><td class="label">Payment Method</td><td>${escapeHtml(row.payment_method)}</td></tr>
      </table>

      ${(row.rider_name || row.rider_phone) ? `
      <div class="section-title">Assigned Rider</div>
      <table>
        <tr><td class="label">Rider Name</td><td>${escapeHtml(row.rider_name)}</td></tr>
        <tr><td class="label">Rider Phone</td><td>${escapeHtml(row.rider_phone)}</td></tr>
      </table>` : ''}

      ${row.instructions ? `
      <div class="section-title">Special Instructions</div>
      <table><tr><td>${escapeHtml(row.instructions)}</td></tr></table>` : ''}

      <div class="footer">Town Parcel — Local Delivery Service &middot; Generated ${new Date().toLocaleString('en-IN')}</div>

      <div class="no-print" style="text-align:center; margin-top:24px;">
        <button onclick="window.print()" style="background:#D4A017; border:none; padding:10px 20px; border-radius:8px; font-weight:700; cursor:pointer;">Print / Save as PDF</button>
      </div>
    </body>
    </html>
  `);
  win.document.close();
}
</script>
</body>
</html>
