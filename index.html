<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Town Parcel | Just Remember. We Reach Out.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#111111;
    --gold:#D4A017;
    --gold-light:#e8c34a;
    --white:#FFFFFF;
    --cream:#F9F6F0;
    --gray:#6b6b6b;
    --shadow: 0 20px 50px -20px rgba(17,17,17,0.15);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Inter', sans-serif;
    color:var(--black);
    background:var(--white);
    overflow-x:hidden;
  }
  h1,h2,h3,h4,.brand-font{font-family:'Poppins', sans-serif;}
  a{text-decoration:none;color:inherit;}
  ul{list-style:none;}
  img{max-width:100%;display:block;}
  .container{
    max-width:1240px;
    margin:0 auto;
    padding:0 32px;
  }
  section{position:relative;}

  /* ---------- HEADER ---------- */
  header{
    position:fixed;
    top:0;left:0;right:0;
    z-index:1000;
    padding:18px 0;
    background:rgba(17,17,17,0.0);
    transition:all .4s ease;
  }
  header.scrolled{
    background:rgba(17,17,17,0.92);
    backdrop-filter:blur(14px);
    padding:12px 0;
    box-shadow:0 8px 30px rgba(0,0,0,0.25);
  }
  .header-inner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:24px;
  }
  .logo{
    display:flex;align-items:center;gap:10px;
    font-weight:800;font-size:1.15rem;color:var(--white);
    letter-spacing:.5px;
  }
  .logo img{height:46px;width:auto;}
  nav ul{display:flex;gap:34px;}
  nav a{
    color:var(--white);
    font-weight:500;
    font-size:.94rem;
    position:relative;
    padding-bottom:4px;
    transition:color .25s ease;
  }
  nav a::after{
    content:'';position:absolute;left:0;bottom:0;
    width:0;height:2px;background:var(--gold);
    transition:width .3s ease;
  }
  nav a:hover{color:var(--gold-light);}
  nav a:hover::after{width:100%;}
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:13px 26px;
    border-radius:50px;
    font-weight:600;
    font-size:.92rem;
    cursor:pointer;
    border:none;
    transition:transform .25s ease, box-shadow .25s ease;
    white-space:nowrap;
  }
  .btn:hover{transform:translateY(-3px);}
  .btn-gold{background:var(--gold); color:var(--black);}
  .btn-gold:hover{box-shadow:0 12px 24px -8px rgba(212,160,23,.6);}
  .btn-dark{background:var(--black); color:var(--white);}
  .btn-dark:hover{box-shadow:0 12px 24px -8px rgba(0,0,0,.4);}
  .btn-outline{background:transparent;border:1.5px solid var(--black);color:var(--black);}
  .btn-outline:hover{background:var(--black); color:var(--white);}
  .btn-whatsapp{background:#25D366;color:#fff;}
  .btn-whatsapp:hover{box-shadow:0 12px 24px -8px rgba(37,211,102,.6);}

  .menu-toggle{display:none;flex-direction:column;gap:5px;cursor:pointer;z-index:1100;background:none;border:none;}
  .menu-toggle span{width:26px;height:2.5px;background:var(--white);border-radius:2px;transition:.3s;}

  /* ---------- HERO ---------- */
  .hero{
    padding:170px 0 90px;
    background:linear-gradient(180deg, #171717 0%, #111111 60%);
    color:var(--white);
    overflow:hidden;
    position:relative;
  }
  .hero::before{
    content:'';
    position:absolute;
    width:600px;height:600px;
    background:radial-gradient(circle, rgba(212,160,23,0.18) 0%, transparent 70%);
    top:-200px;right:-150px;
    pointer-events:none;
  }
  .hero-inner{
    display:grid;
    grid-template-columns:1.05fr .95fr;
    gap:60px;
    align-items:center;
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    color:var(--gold);
    font-weight:600;
    font-size:.8rem;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:18px;
  }
  .eyebrow::before{content:'';width:26px;height:2px;background:var(--gold);display:inline-block;}
  .hero h1{
    font-size:clamp(2.6rem, 5vw, 4.2rem);
    font-weight:900;
    line-height:1.05;
    letter-spacing:-1px;
  }
  .hero h1 span{color:var(--gold);}
  .hero .sub{
    font-size:clamp(1.3rem,2vw,1.7rem);
    font-weight:600;
    margin-top:14px;
    color:#f1f1f1;
  }
  .hero .sub em{color:var(--gold); font-style:normal;}
  .hero p.desc{
    margin-top:22px;
    font-size:1.05rem;
    line-height:1.7;
    color:#c9c9c9;
    max-width:520px;
  }
  .hero-btns{display:flex;gap:16px;margin-top:36px;flex-wrap:wrap;}
  .hero-visual{
    position:relative;
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 40px 80px -30px rgba(0,0,0,0.6);
    animation:float 5s ease-in-out infinite;
  }
  .hero-visual img{width:100%;height:100%;object-fit:cover;}
  @keyframes float{
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-14px);}
  }

  /* fade-in on scroll */
  .reveal{opacity:0; transform:translateY(30px); transition:opacity .7s ease, transform .7s ease;}
  .reveal.in{opacity:1; transform:translateY(0);}

  /* ---------- SECTION HEADINGS ---------- */
  .section-head{text-align:center; max-width:640px; margin:0 auto 56px;}
  .section-head .eyebrow{justify-content:center; color:var(--gold);}
  .section-head .eyebrow::before{display:none;}
  .section-head h2{
    font-size:clamp(1.8rem,3vw,2.5rem);
    font-weight:800;
    letter-spacing:-.5px;
  }
  .section-head p{margin-top:12px;color:var(--gray); font-size:1.02rem;}
  .underline-gold{
    width:56px;height:3px;background:var(--gold);
    margin:14px auto 0;border-radius:3px;
  }

  /* ---------- WHAT WE DELIVER ---------- */
  .deliver{padding:110px 0; background:var(--white);}
  .deliver-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:22px;
  }
  .service-card{
    background:var(--cream);
    border-radius:22px;
    padding:32px 22px;
    text-align:center;
    transition:transform .35s ease, box-shadow .35s ease, background .35s ease;
    cursor:pointer;
  }
  .service-card:hover{
    transform:translateY(-10px);
    box-shadow:var(--shadow);
    background:var(--white);
    border:1px solid rgba(212,160,23,.3);
  }
  .service-icon{
    width:62px;height:62px;
    margin:0 auto 18px;
    display:flex;align-items:center;justify-content:center;
    background:var(--black);
    border-radius:16px;
    transition:background .3s ease, transform .3s ease;
  }
  .service-card:hover .service-icon{background:var(--gold); transform:rotate(-8deg) scale(1.05);}
  .service-icon svg{width:28px;height:28px;stroke:var(--gold);}
  .service-card:hover .service-icon svg{stroke:var(--black);}
  .service-card h3{font-size:1.02rem;font-weight:700;margin-bottom:6px;}
  .service-card p.tag{font-size:.82rem;color:var(--gray);margin-bottom:16px;}
  .book-btn{
    font-size:.8rem;font-weight:600;color:var(--black);
    display:inline-flex;align-items:center;gap:6px;
    border-bottom:1.5px solid var(--gold);
    padding-bottom:2px;
    transition:gap .25s ease, color .25s ease;
  }
  .book-btn:hover{gap:10px; color:var(--gold);}

  /* ---------- HOW IT WORKS ---------- */
  .how{padding:110px 0; background:var(--cream);}
  .how-cols{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:60px;
  }
  .how-col h3{
    font-size:1.2rem;font-weight:700;
    text-align:center;margin-bottom:34px;
    position:relative;
  }
  .how-col h3::after{
    content:'';display:block;width:40px;height:3px;background:var(--gold);
    margin:10px auto 0;border-radius:3px;
  }
  .steps{display:flex;flex-direction:column;gap:0;}
  .step{
    display:flex;gap:20px;align-items:flex-start;
    padding:18px 0;
    position:relative;
  }
  .step:not(:last-child)::before{
    content:'';
    position:absolute;
    left:24px; top:62px; bottom:-10px;
    width:2px;
    background:repeating-linear-gradient(to bottom, var(--gold) 0 6px, transparent 6px 12px);
  }
  .step-num{
    flex-shrink:0;
    width:50px;height:50px;
    border-radius:50%;
    background:var(--black);
    color:var(--gold);
    font-weight:800;font-size:1.1rem;
    display:flex;align-items:center;justify-content:center;
    z-index:2;
    transition:transform .3s ease;
  }
  .step:hover .step-num{transform:scale(1.1); background:var(--gold); color:var(--black);}
  .step-text h4{font-size:1rem;font-weight:700;margin-bottom:4px;}
  .step-text p{font-size:.88rem;color:var(--gray);}

  /* ---------- WHY CHOOSE ---------- */
  .why{padding:110px 0;background:var(--white);}
  .why-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:26px;
  }
  .why-card{
    display:flex;align-items:center;gap:18px;
    padding:26px 24px;
    border-radius:20px;
    border:1px solid #eee;
    transition:all .3s ease;
  }
  .why-card:hover{
    border-color:var(--gold);
    box-shadow:var(--shadow);
    transform:translateY(-6px);
  }
  .why-icon{
    width:50px;height:50px;flex-shrink:0;
    border-radius:14px;
    background:var(--cream);
    display:flex;align-items:center;justify-content:center;
  }
  .why-icon svg{width:24px;height:24px;stroke:var(--gold);}
  .why-card h4{font-size:.98rem;font-weight:700;}

  /* ---------- PARTNER GRID ---------- */
  .partners{padding:110px 0; background:var(--cream);}
  .partners-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:16px;
  }
  .partner-chip{
    background:var(--white);
    padding:20px 14px;
    border-radius:16px;
    text-align:center;
    font-size:.88rem;
    font-weight:600;
    display:flex;flex-direction:column;align-items:center;gap:10px;
    border:1px solid #ececec;
    transition:all .3s ease;
  }
  .partner-chip:hover{
    background:var(--black); color:var(--white);
    transform:translateY(-6px);
    border-color:var(--black);
  }
  .partner-chip svg{width:24px;height:24px;stroke:var(--gold);}

  /* ---------- BECOME RIDER ---------- */
  .rider-section{
    background:var(--black);
    color:var(--white);
    padding:100px 0;
    overflow:hidden;
  }
  .rider-inner{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:50px;
    align-items:center;
  }
  .rider-text .eyebrow{color:var(--gold);}
  .rider-text h2{
    font-size:clamp(1.9rem,3vw,2.6rem);
    font-weight:800;
    line-height:1.15;
    margin-bottom:18px;
  }
  .rider-text h2 span{color:var(--gold);}
  .rider-text p{color:#cfcfcf;font-size:1.02rem;line-height:1.7;margin-bottom:14px;}
  .rider-text .btn{margin-top:20px;}
  .rider-visual{
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 30px 70px -20px rgba(212,160,23,0.25);
  }

  /* ---------- STATS ---------- */
  .stats{
    background:var(--black);
    padding:0 0 100px;
  }
  .stats-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    background:#181818;
    border-radius:24px;
    padding:44px 20px;
    gap:20px;
  }
  .stat{text-align:center;color:var(--white);}
  .stat h3{font-size:2.2rem;font-weight:900;color:var(--gold);}
  .stat p{font-size:.85rem;color:#bbb;margin-top:6px;}

  /* ---------- SERVICE AREA + CONTACT ---------- */
  .area-contact{padding:110px 0;background:var(--white);}
  .ac-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:26px;
  }
  .ac-card{
    background:var(--cream);
    border-radius:24px;
    padding:40px;
  }
  .ac-card h3{font-size:1.3rem;font-weight:800;margin-bottom:6px;}
  .ac-card .highlight{color:var(--gold); font-weight:800; font-size:1.15rem;}
  .map-visual{
    margin-top:24px;
    border-radius:16px;
    overflow:hidden;
    height:180px;
    background:
      linear-gradient(#eee,#eee) ,
      repeating-linear-gradient(0deg, transparent, transparent 24px, #ddd 24px, #ddd 25px),
      repeating-linear-gradient(90deg, transparent, transparent 24px, #ddd 24px, #ddd 25px);
    position:relative;
  }
  .map-pin{
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-100%);
    width:26px;height:26px;
    background:var(--gold);
    border-radius:50% 50% 50% 0;
    transform-origin:bottom;
    animation:pulse-pin 2s ease-in-out infinite;
  }
  @keyframes pulse-pin{
    0%,100%{transform:translate(-50%,-100%) rotate(-45deg) scale(1);}
    50%{transform:translate(-50%,-100%) rotate(-45deg) scale(1.15);}
  }
  .contact-list{margin-top:22px;display:flex;flex-direction:column;gap:16px;}
  .contact-row{display:flex;align-items:center;gap:14px;}
  .contact-row .ci{
    width:42px;height:42px;border-radius:12px;
    background:var(--black);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .contact-row .ci svg{width:20px;height:20px;stroke:var(--gold);}
  .contact-row div p{font-size:.78rem;color:var(--gray);}
  .contact-row div h4{font-size:.98rem;font-weight:700;}
  .contact-visual{
    margin-top:26px;
    display:flex;justify-content:center;
  }
  .contact-visual img{max-width:280px;}

  /* ---------- FOOTER ---------- */
  footer{background:var(--black); color:#ddd; padding:70px 0 26px;}
  .footer-top{
    display:grid;
    grid-template-columns:1.3fr 1fr 1fr 1fr;
    gap:40px;
    padding-bottom:44px;
    border-bottom:1px solid #2a2a2a;
  }
  .footer-brand .logo{color:var(--white); margin-bottom:14px;}
  .footer-brand .logo-badge{
    display:inline-flex;
    background:var(--white);
    padding:10px 16px;
    border-radius:14px;
  }
  .footer-brand .logo-badge img{height:34px;width:auto;filter:none;}
  .footer-brand p{font-size:.9rem;color:#aaa;line-height:1.7;max-width:280px;}
  footer h4{font-size:.95rem;font-weight:700;color:var(--white);margin-bottom:18px;}
  footer ul li{margin-bottom:11px;}
  footer ul a{font-size:.88rem;color:#bbb;transition:color .25s ease;}
  footer ul a:hover{color:var(--gold);}
  .social-row{display:flex;gap:12px;margin-top:6px;}
  .social-row a{
    width:38px;height:38px;border-radius:50%;
    background:#1e1e1e;
    display:flex;align-items:center;justify-content:center;
    transition:background .3s ease, transform .3s ease;
  }
  .social-row a:hover{background:var(--gold); transform:translateY(-4px);}
  .social-row a svg{width:17px;height:17px;stroke:var(--white);}
  .social-row a:hover svg{stroke:var(--black);}
  .footer-bottom{
    display:flex;justify-content:space-between;align-items:center;
    padding-top:24px;
    font-size:.82rem;color:#888;
    flex-wrap:wrap;gap:10px;
  }
  .footer-bottom a{color:var(--gold);}

  /* ---------- FLOATING WHATSAPP ---------- */
  .floating-wa{
    position:fixed;
    bottom:26px;right:26px;
    width:62px;height:62px;
    background:#25D366;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 30px rgba(37,211,102,.5);
    z-index:999;
    animation:pulse-wa 2.4s infinite;
  }
  .floating-wa svg{width:30px;height:30px;fill:#fff;}
  @keyframes pulse-wa{
    0%{box-shadow:0 0 0 0 rgba(37,211,102,.6);}
    70%{box-shadow:0 0 0 18px rgba(37,211,102,0);}
    100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
  }

  /* ---------- RESPONSIVE ---------- */
  @media (max-width:1024px){
    .deliver-grid{grid-template-columns:repeat(2,1fr);}
    .why-grid{grid-template-columns:repeat(2,1fr);}
    .partners-grid{grid-template-columns:repeat(3,1fr);}
    .stats-grid{grid-template-columns:repeat(2,1fr);}
    .hero-inner{grid-template-columns:1fr;}
    .hero-visual{order:-1;}
    .rider-inner{grid-template-columns:1fr;}
    .rider-visual{order:-1;}
    .footer-top{grid-template-columns:1fr 1fr;}
  }
  @media (max-width:720px){
    nav{
      position:fixed;top:0;right:-100%;
      width:78%;height:100vh;
      background:var(--black);
      flex-direction:column;
      padding:100px 40px;
      transition:right .4s ease;
    }
    nav.open{right:0;}
    nav ul{flex-direction:column;gap:26px;}
    .menu-toggle{display:flex;}
    .how-cols{grid-template-columns:1fr;}
    .deliver-grid{grid-template-columns:1fr 1fr;}
    .why-grid{grid-template-columns:1fr;}
    .partners-grid{grid-template-columns:repeat(2,1fr);}
    .stats-grid{grid-template-columns:1fr 1fr;}
    .ac-grid{grid-template-columns:1fr;}
    .hero-btns .btn{flex:1; justify-content:center;}
  }
</style>
</head>
<body>
