<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Reset Password — Town Parcel Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
<style>
  body{
    background:var(--black);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .card{
    background:var(--white);
    border-radius:18px;
    padding:40px;
    max-width:380px;
    width:100%;
  }
  .card h2{font-size:1.4rem;font-weight:800;margin:0 0 6px;}
  .card .sub{color:var(--gray);font-size:.88rem;margin-bottom:26px;}
  .field{margin-bottom:16px;display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:.78rem;font-weight:700;}
  .field input{
    border:1.5px solid var(--gray-light);
    border-radius:10px;
    padding:12px 14px;
    font-size:.92rem;
  }
  .field input:focus{outline:none;border-color:var(--gold);}
  .submit-btn{
    width:100%;
    background:var(--gold);
    color:var(--black);
    border:none;
    padding:13px;
    border-radius:10px;
    font-weight:800;
    font-size:.95rem;
    cursor:pointer;
    margin-top:6px;
  }
  .submit-btn:disabled{opacity:.65;cursor:not-allowed;}
  .form-msg{
    display:none;
    margin-top:14px;
    padding:11px 14px;
    border-radius:10px;
    font-size:.82rem;
    font-weight:600;
  }
  .form-msg.show{display:block;}
  .form-msg.success{background:var(--success-bg);color:var(--success);}
  .form-msg.error{background:var(--danger-bg);color:var(--danger);}
  .back-link{display:block;text-align:center;margin-top:18px;font-size:.83rem;color:var(--gray);text-decoration:none;}
</style>
</head>
<body>

<div class="card">
  <h2>Set a new password</h2>
  <p class="sub">Choose a new password for your Town Parcel admin account.</p>
  <form id="resetForm">
    <div class="field">
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" required minlength="6" autocomplete="new-password">
    </div>
    <div class="field">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
    </div>
    <button type="submit" class="submit-btn" id="resetBtn">Update Password</button>
    <div class="form-msg" id="resetMsg"></div>
  </form>
  <a class="back-link" href="login.html">&larr; Back to sign in</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>
  const resetForm = document.getElementById('resetForm');
  const resetBtn = document.getElementById('resetBtn');
  const resetMsg = document.getElementById('resetMsg');

  function showMsg(type, text){
    resetMsg.className = 'form-msg show ' + type;
    resetMsg.textContent = text;
  }

  resetForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('newPassword').value;
    const confirmPw = document.getElementById('confirmPassword').value;

    if(pw !== confirmPw){
      showMsg('error', 'Passwords do not match.');
      return;
    }

    resetBtn.disabled = true;
    resetBtn.textContent = 'Updating…';

    const { error } = await sb.auth.updateUser({ password: pw });

    resetBtn.disabled = false;
    resetBtn.textContent = 'Update Password';

    if(error){
      showMsg('error', error.message);
      return;
    }

    showMsg('success', 'Password updated! Redirecting to sign in…');
    setTimeout(() => { window.location.replace('login.html'); }, 1500);
  });
</script>
</body>
</html>
